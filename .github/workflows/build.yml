name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > liftlog-release.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ../liftlog-release.jks
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk LiftLog.apk

      - name: Publish to rolling latest release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest \
            --title "LiftLog – latest build" \
            --notes "Auto-built from \`main\` on $(date -u '+%Y-%m-%d %H:%M UTC'). Install on Android: download **LiftLog.apk** below." \
            --prerelease \
            LiftLog.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
